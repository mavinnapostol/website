<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>calculator</title>
  <style>
    /* Theme variables (light, nature-inspired) */
    :root{
      --bg:#f5fbf6;             /* soft cream background */
      --panel:#9e6377;          /* panel white */
      --accent:#eceeec;         /* green accent */
      --accent-strong:#eaedeb;  /* stronger green for hover/active */
      --text:#072012;           /* dark green text */
      --muted:#af6896;          /* muted green */
      --leaf-opacity:0.06;      /* background leaf art opacity */
      --glass: rgba(0,0,0,0.03);
      --shadow: 0 6px 18px rgba(18,40,24,0.08);
    }

    /* Page */
    html,body{
      height:100%;
      margin:0;
      font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background:
        radial-gradient(1200px 700px at 10% 10%, rgba(46,160,68,0.04), transparent),
        linear-gradient(180deg,var(--bg) 0%, #b5538c 100%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:2rem;
    }

    /* Subtle environmental artwork (repeating leaves) */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:
        radial-gradient(circle at 15% 20%, rgba(46,160,68,var(--leaf-opacity)) 0 60px, transparent 61px),
        radial-gradient(circle at 85% 85%, rgba(46,160,68,var(--leaf-opacity)) 0 90px, transparent 91px),
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 200 200"><g fill="%232ea044" fill-opacity="0.06"><path d="M42 10c25 5 40 25 40 25s-20 2-40-6C14 18-6 6 0 0c6 6 20 9 42 10z"/><path d="M160 200c-25-5-40-25-40-25s20-2 40 6c26 13 46 25 40 31-6-6-20-9-40-12z"/></g></svg>');
      background-repeat:repeat;
      background-size: 400px 400px;
      pointer-events:none;
      z-index:0;
      mix-blend-mode:multiply;
      opacity:0.6;
      filter: blur(6px) saturate(1);
    }

    /* Calculator card */
    .calc {
      position:relative;
      z-index:1;
      width:340px;
      max-width:95vw;
      border-radius:16px;
      padding:18px;
      background:
        linear-gradient(180deg, rgba(191, 92, 148, 0.9), rgba(225, 110, 200, 0.95));
      box-shadow:var(--shadow);
      border:1px solid rgba(18,40,24,0.04);
    }

    header.calc-header{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }
    .logo {
      width:44px;
      height:44px;
      background:linear-gradient(135deg,var(--accent),var(--accent-strong));
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 6px 16px rgba(30,143,55,0.12), inset 0 -6px 12px rgba(0,0,0,0.06);
      flex-shrink:0;
    }
    .logo svg { width:22px; height:22px; transform:translateY(-1px); }

    .title {
      font-weight:700;
      font-size:1.05rem;
      letter-spacing:0.2px;
      color:var(--text);
    }
    .subtitle {
      font-size:0.75rem;
      color:var(--muted);
      margin-top:2px;
    }

    /* Display */
    .display {
      background: linear-gradient(180deg, rgba(10,30,15,0.02), rgba(10,30,15,0.01));
      border-radius:10px;
      padding:14px 12px;
      margin-bottom:12px;
      min-height:72px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:6px;
      border:1px solid rgba(18,40,24,0.04);
      box-shadow: inset 0 -6px 18px rgba(10,30,15,0.02);
    }
    .display .history {
      font-size:0.82rem;
      color:var(--muted);
      text-align:right;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      padding-right:2px;
    }
    .display .value {
      font-size:1.7rem;
      font-weight:700;
      text-align:right;
      color:var(--text);
      word-break:break-all;
    }

    /* Grid of buttons */
    .keys {
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
    }

    button.key {
      border:0;
      padding:14px;
      border-radius:8px;
      font-size:1.05rem;
      color:var(--text);
      background:var(--panel);
      box-shadow: 0 6px 14px rgba(9,30,18,0.06);
      cursor:pointer;
      transition:transform .08s ease, box-shadow .08s ease, background .08s ease;
      user-select:none;
    }
    button.key:active { transform:translateY(2px); box-shadow:0 3px 8px rgba(9,30,18,0.06); }

    /* Operator keys */
    .key.op{
      background: linear-gradient(180deg, rgba(46,160,68,0.12), rgba(46,160,68,0.08));
      color:#072012;
      border:1px solid rgba(46,160,68,0.12);
      box-shadow: 0 8px 24px rgba(46,160,68,0.06);
    }
    .key.op:active { background: linear-gradient(180deg, var(--accent-strong), var(--accent)); color:#962476; }

    /* Big keys */
    .key.wide { grid-column: span 2; }

    /* Special keys (clear/back) */
    .key.clear {
      background:linear-gradient(180deg, rgba(220,60,60,0.10), rgba(220,60,60,0.06));
      color:#7b2f2f;
      border:1px solid rgba(220,60,60,0.08);
    }

    /* Equals */
    .key.equals {
      background: linear-gradient(180deg, var(--accent), var(--accent-strong));
      color:#ffffff;
      font-weight:700;
      box-shadow: 0 8px 28px rgba(30,143,55,0.12);
    }

    /* Hover focus */
    button.key:hover{ transform:translateY(-2px); }
    button.key:focus{ outline:3px solid rgba(46,160,68,0.12); outline-offset:3px; }

    /* Footer note */
    .note{
      margin-top:10px;
      font-size:0.78rem;
      color:var(--muted);
      text-align:center;
    }

    @media (max-width:420px){
      .calc{ width:300px; padding:14px; }
      .display .value{ font-size:1.45rem; }
      .logo{ width:40px; height:40px; }
    }
  </style>
</head>
<body>
  <main class="calc" role="application" aria-label="Eco themed calculator">
    <header class="calc-header">
      <div class="logo" aria-hidden="true">
        <!-- leaf + spark icon -->
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2c4 0 7 3 7 7 0 5-6 10-7 13-1-3-7-8-7-13 0-4 3-7 7-7z" fill="#fff"/>
        </svg>
      </div>
      <div>
        <div class="title">Kaleido</div>
      </div>
    </header>

    <section class="display" aria-live="polite">
      <div class="history" id="calc-history" aria-hidden="true"></div>
      <div class="value" id="calc-display">0</div>
    </section>

    <section class="keys" role="group" aria-label="Calculator keys">
      <button class="key clear" data-action="clear" aria-label="Clear (C)">C</button>
      <button class="key" data-action="back" aria-label="Backspace">←</button>
      <button class="key" data-action="percent" aria-label="Percent">%</button>
      <button class="key op" data-action="operator" data-op="/" aria-label="Divide">÷</button>

      <button class="key" data-number="7">7</button>
      <button class="key" data-number="8">8</button>
      <button class="key" data-number="9">9</button>
      <button class="key op" data-action="operator" data-op="*" aria-label="Multiply">×</button>

      <button class="key" data-number="4">4</button>
      <button class="key" data-number="5">5</button>
      <button class="key" data-number="6">6</button>
      <button class="key op" data-action="operator" data-op="-" aria-label="Subtract">−</button>

      <button class="key" data-number="1">1</button>
      <button class="key" data-number="2">2</button>
      <button class="key" data-number="3">3</button>
      <button class="key op" data-action="operator" data-op="+" aria-label="Add">+</button>

      <button class="key wide" data-number="0" aria-label="Zero">0</button>
      <button class="key" data-number=".">.</button>
      <button class="key equals" data-action="equals" aria-label="Equals">=</button>
    </section>

    <div class="note">Tip: You can use keyboard (numbers, + - * /, Enter, Backspace).</div>
  </main>

  <script>
    // Simple calculator logic with keyboard support
    (function(){
      const displayEl = document.getElementById('calc-display');
      const historyEl = document.getElementById('calc-history');
      const keys = document.querySelectorAll('button.key');

      let current = '0';        // current input as string
      let previous = null;      // previous number
      let op = null;            // pending operator
      let overwrite = false;    // whether next number replaces current

      function updateDisplay(){
        displayEl.textContent = current;
        historyEl.textContent = previous !== null && op ? `${previous} ${op}` : '';
      }

      function inputNumber(n){
        if (overwrite) {
          current = (n === '.') ? '0.' : String(n);
          overwrite = false;
          return;
        }
        if (n === '.' && current.includes('.')) return;
        if (current === '0' && n !== '.') current = String(n);
        else current = current + String(n);
      }

      function handleOperator(nextOp){
        if (op && !overwrite){
          // compute existing op first
          compute();
        }
        previous = parseFloat(current);
        op = nextOp;
        overwrite = true;
      }

      function compute(){
        if (op == null || previous == null) return;
        const a = previous;
        const b = parseFloat(current);
        let result = 0;
        switch(op){
          case '+': result = a + b; break;
          case '-': result = a - b; break;
          case '*': result = a * b; break;
          case '/':
            if (b === 0){
              current = "Error";
              previous = null; op = null; overwrite = true; updateDisplay(); return;
            }
            result = a / b; break;
          default: return;
        }
        // avoid floating imprecision in display
        if (!Number.isFinite(result)) { current = "Error"; }
        else {
          // trim trailing zeros
          current = String(parseFloat(String(result.toFixed(12))));
        }
        previous = null;
        op = null;
        overwrite = true;
      }

      function clearAll(){
        current = '0'; previous = null; op = null; overwrite = false;
      }

      function backspace(){
        if (overwrite){ current = '0'; overwrite = false; return; }
        if (current.length === 1 || (current.length === 2 && current.startsWith('-'))){
          current = '0';
        } else {
          current = current.slice(0, -1);
        }
      }

      function percent(){
        const val = parseFloat(current);
        if (isNaN(val)) return;
        current = String(val / 100);
        overwrite = true;
      }

      // wire up UI
      keys.forEach(btn => {
        btn.addEventListener('click', () => {
          const num = btn.getAttribute('data-number');
          const action = btn.getAttribute('data-action');
          if (num !== null){
            inputNumber(num);
            updateDisplay();
            return;
          }
          if (action === 'clear') {
            clearAll(); updateDisplay(); return;
          }
          if (action === 'back') { backspace(); updateDisplay(); return; }
          if (action === 'percent'){ percent(); updateDisplay(); return; }
          if (action === 'operator'){
            handleOperator(btn.getAttribute('data-op')); updateDisplay(); return;
          }
          if (action === 'equals'){ compute(); updateDisplay(); return; }
        });
      });

      // keyboard support
      window.addEventListener('keydown', (e) => {
        if (e.key >= '0' && e.key <= '9') { inputNumber(e.key); updateDisplay(); e.preventDefault(); }
        else if (e.key === '.' || e.key === ',') { inputNumber('.'); updateDisplay(); e.preventDefault(); }
        else if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') { handleOperator(e.key); updateDisplay(); e.preventDefault(); }
        else if (e.key === 'Enter' || e.key === '=') { compute(); updateDisplay(); e.preventDefault(); }
        else if (e.key === 'Backspace') { backspace(); updateDisplay(); e.preventDefault(); }
        else if (e.key.toLowerCase() === 'c') { clearAll(); updateDisplay(); e.preventDefault(); }
        else if (e.key === '%') { percent(); updateDisplay(); e.preventDefault(); }
      });

      // initialize
      updateDisplay();
    })();
  </script>
</body>
</html>
